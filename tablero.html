<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Manager | Tablero Kanban</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome para iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Estilos sutiles para el drag & drop y el scroll */
    .kanban-column { min-height: 50vh; }
    .drag-over { background-color: #e2e8f0; border: 2px dashed #94a3b8; }
    /* Scrollbar delgada */
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

<!-- Navegación Superior -->
<nav class="bg-blue-700 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
    <div class="flex items-center space-x-4">
      <h1 class="font-bold text-xl"><i class="fa-solid fa-code-branch mr-2"></i>XP Manager</h1>
      <a href="index.html" class="bg-blue-800 px-3 py-2 rounded-md font-medium">Equipo</a>
      <a href="tablero.html" class="bg-blue-800 px-3 py-2 rounded-md font-medium">Tablero</a>
      <a href="diseno.html" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium text-blue-100">Diseño (CRC)</a>
      <a href="pruebas.html" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium text-blue-100">Pruebas</a>
      <a href="metricas.html" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium text-blue-100">Métricas</a>
    </div>
    <div class="flex items-center space-x-4">
      <span id="user-info" class="text-sm font-medium text-gray-200"></span>
      <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded-md text-sm font-medium transition text-white">
        <i class="fa-solid fa-right-from-bracket"></i> Salir
      </button>
    </div>
  </div>
</nav>

<!-- Controles de la Iteración -->
<header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
  <div class="flex items-center space-x-4">
    <h2 class="text-lg font-bold text-gray-700">Iteración:</h2>
    <div class="flex items-center space-x-2">
      <select id="iteration-select" class="bg-gray-100 border-gray-300 rounded-md py-1 px-3 focus:ring-blue-500 font-semibold text-gray-800"></select>
      <button id="btn-new-iteration" class="bg-green-100 text-green-700 hover:bg-green-200 font-bold px-3 py-1 rounded shadow-sm transition" title="Crear nueva iteración">+</button>
    </div>
  </div>
  <button id="btn-new-story" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md font-bold shadow transition">
    <i class="fa-solid fa-plus mr-1"></i> Nueva Historia de Usuario
  </button>
</header>

<!-- El Tablero Kanban -->
<main class="flex-1 overflow-x-auto p-8">
  <div class="flex space-x-6 min-w-max h-full">

    <!-- Columna: Pendiente -->
    <div class="bg-gray-200 rounded-lg w-80 flex flex-col shadow-sm">
      <div class="p-3 border-b border-gray-300 font-bold text-gray-700 flex justify-between items-center rounded-t-lg bg-gray-100">
        <span>Pendiente</span>
        <span class="bg-gray-300 text-gray-700 text-xs px-2 py-1 rounded-full count-badge">0</span>
      </div>
      <div id="col-pendiente" class="kanban-column p-3 flex-1 overflow-y-auto space-y-3" data-status="Pendiente">
        <!-- Las tarjetas se inyectarán aquí -->
      </div>
    </div>

    <!-- Columna: En Progreso -->
    <div class="bg-blue-100 rounded-lg w-80 flex flex-col shadow-sm">
      <div class="p-3 border-b border-blue-200 font-bold text-blue-800 flex justify-between items-center rounded-t-lg bg-blue-50">
        <span>En Progreso</span>
        <span class="bg-blue-200 text-blue-800 text-xs px-2 py-1 rounded-full count-badge">0</span>
      </div>
      <div id="col-progreso" class="kanban-column p-3 flex-1 overflow-y-auto space-y-3" data-status="En Progreso"></div>
    </div>

    <!-- Columna: Pruebas -->
    <div class="bg-yellow-100 rounded-lg w-80 flex flex-col shadow-sm">
      <div class="p-3 border-b border-yellow-200 font-bold text-yellow-800 flex justify-between items-center rounded-t-lg bg-yellow-50">
        <span>Pruebas (Testing)</span>
        <span class="bg-yellow-200 text-yellow-800 text-xs px-2 py-1 rounded-full count-badge">0</span>
      </div>
      <div id="col-pruebas" class="kanban-column p-3 flex-1 overflow-y-auto space-y-3" data-status="Pruebas"></div>
    </div>

    <!-- Columna: Hecho -->
    <div class="bg-green-100 rounded-lg w-80 flex flex-col shadow-sm">
      <div class="p-3 border-b border-green-200 font-bold text-green-800 flex justify-between items-center rounded-t-lg bg-green-50">
        <span>Hecho</span>
        <span class="bg-green-200 text-green-800 text-xs px-2 py-1 rounded-full count-badge">0</span>
      </div>
      <div id="col-hecho" class="kanban-column p-3 flex-1 overflow-y-auto space-y-3" data-status="Hecho"></div>
    </div>

  </div>
</main>

<div id="modal-story" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-[60] backdrop-blur-sm">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden relative">
    <div class="bg-blue-700 px-6 py-4 flex justify-between items-center">
      <h3 class="text-xl font-bold text-white">Formulario de Historia</h3>
      <button id="close-modal-story" class="text-white hover:text-gray-200"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <form id="form-story" class="p-6 space-y-4">
      <input type="hidden" id="story-id">
      <div>
        <label class="block text-sm font-bold text-gray-700">Título Corto</label>
        <input type="text" id="story-title" required class="mt-1 w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500">
      </div>
      <div class="bg-gray-50 p-4 rounded-md border border-gray-200 space-y-3">
        <div class="flex items-center space-x-2"><span class="text-sm font-semibold">Como</span><input type="text" id="story-role" required class="flex-1 border p-1 rounded"></div>
        <div class="flex items-center space-x-2"><span class="text-sm font-semibold">quiero</span><input type="text" id="story-desire" required class="flex-1 border p-1 rounded"></div>
        <div class="flex items-center space-x-2"><span class="text-sm font-semibold">para</span><input type="text" id="story-benefit" required class="flex-1 border p-1 rounded"></div>
      </div>
      <div class="flex justify-between items-center pt-4">
        <select id="story-points" class="border border-gray-300 rounded-md p-2 bg-white w-32">
          <option value="1">1 Punto</option> <option value="2">2 Puntos</option> <option value="3">3 Puntos</option>
          <option value="5">5 Puntos</option> <option value="8">8 Puntos</option> <option value="13">13 Puntos</option>
        </select>
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md shadow">Guardar</button>
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Fecha de Creación</label>
        <input type="datetime-local" id="story-date" required class="border border-gray-300 rounded-md p-2 bg-white w-full">
      </div>
    </form>
  </div>
</div>

<div id="modal-details" class="hidden fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 backdrop-blur-sm">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-5xl h-5/6 overflow-hidden flex flex-col">
    <div class="bg-slate-800 px-6 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <h3 id="detail-title" class="text-xl font-bold text-white">Cargando...</h3>
        <span id="detail-status" class="bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-full uppercase">ESTADO</span>
      </div>
      <button id="close-modal-details" class="text-white hover:text-gray-300"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>

    <div class="flex-1 overflow-y-auto p-6 flex flex-col md:flex-row gap-6 bg-gray-50">
      <div class="flex-1 space-y-6">
        <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
          <div class="flex justify-between items-center mb-2">
            <h4 class="text-xs font-bold text-gray-400 uppercase">Requerimiento</h4>
            <div class="flex space-x-2">
              <button onclick="openEditFormFromDetails()" class="text-blue-500 hover:text-blue-700 text-xs font-bold px-2 py-1 bg-blue-50 rounded transition"><i class="fa-solid fa-pen"></i> Editar</button>
              <button onclick="deleteStoryFromDetails()" class="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1 bg-red-50 rounded transition"><i class="fa-solid fa-trash"></i> Eliminar</button>
            </div>
          </div>
          <p class="text-gray-700 italic" id="detail-description">"Como... quiero... para..."</p>
          <p class="text-sm font-bold text-blue-600 mt-2" id="detail-points">Puntos: 0</p>
        </div>

        <div class="bg-white p-4 rounded-lg border-l-4 border-l-purple-500 shadow-sm">
          <h4 class="font-bold text-purple-700 mb-3"><i class="fa-solid fa-people-arrows mr-2"></i>Pair Programming</h4>
          <form id="form-pair" class="space-y-3">
            <input type="hidden" id="pair-story-id">
            <div><label class="text-xs text-gray-500">Piloto</label><select id="select-piloto" class="w-full mt-1 p-2 border rounded text-sm" required></select></div>
            <div><label class="text-xs text-gray-500">Copiloto</label><select id="select-copiloto" class="w-full mt-1 p-2 border rounded text-sm"><option value="">-- Sin copiloto --</option></select></div>
            <button type="submit" class="bg-purple-100 text-purple-700 py-2 rounded-md text-sm font-bold w-full">Asignar Par</button>
          </form>
        </div>

        <div class="bg-white p-4 rounded-lg border-l-4 border-l-gray-800 shadow-sm">
          <h4 class="font-bold text-gray-800 mb-3"><i class="fa-brands fa-github mr-2"></i>Trazabilidad</h4>
          <form id="form-link" class="flex gap-2">
            <input type="url" id="link-url" placeholder="https://github..." class="flex-1 border p-2 rounded text-sm" required>
            <select id="link-type" class="border p-2 rounded text-sm"><option value="Commit">Commit</option><option value="Pull Request">PR</option></select>
            <button type="submit" class="bg-gray-800 text-white px-3 py-2 rounded text-sm"><i class="fa-solid fa-plus"></i></button>
          </form>
          <ul id="links-list" class="mt-4 space-y-2 text-sm"></ul>
        </div>
      </div>

      <div class="w-full md:w-1/3 bg-white p-4 rounded-lg shadow-sm border overflow-y-auto">
        <h4 class="font-bold text-gray-700 mb-4 border-b pb-2"><i class="fa-solid fa-clock-rotate-left mr-2"></i>Historial</h4>
        <div id="history-timeline" class="space-y-4"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/tablero.js"></script>
</body>
</html>
